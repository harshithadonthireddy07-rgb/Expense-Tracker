<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 8px;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.08);
        }

        input::placeholder { color: #334155; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.35);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px;
            color: #f87171;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 10px;
            padding: 12px;
            color: #4ade80;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #475569;
            font-size: 14px;
        }

        .link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💰</div>
        <h1>Create Account</h1>
        <p class="subtitle">Start tracking your expenses today</p>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Harshitha Donthireddy" />
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="harshitha@gmail.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" />
        </div>

        <button onclick="register()">Create Account →</button>

        <div class="link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://expense-tracker-backend-1-j2c9.onrender.com/api';

        // If already logged in redirect to main app
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        async function register() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name || !email || !password) {
                errorEl.textContent = 'Please fill all fields!';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters!';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.message || 'Registration failed!';
                    errorEl.style.display = 'block';
                    return;
                }

                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                successEl.textContent = 'Account created! Redirecting...';
                successEl.style.display = 'block';

                // Redirect to main app after 1 second
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                errorEl.textContent = 'Server error. Please try again!';
                errorEl.style.display = 'block';
            }
        }

        // Allow pressing Enter to register
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
